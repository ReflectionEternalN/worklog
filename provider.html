<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provider 汇入量报告</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f7fa;color:#333;padding:20px;max-width:1400px;margin:0 auto}
.header{background:linear-gradient(135deg,#1565C0,#0D47A1);color:white;padding:24px 30px;border-radius:12px;margin-bottom:20px}
.header h1{font-size:20px}.header .sub{opacity:.8;font-size:13px;margin-top:6px}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:17px;margin-bottom:14px}
.cal-header{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:12px}
.cal-month-label{font-size:15px;font-weight:bold;min-width:120px;text-align:center}
.cal-arrow{background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;font-size:14px;cursor:pointer;color:#1565C0}
.cal-arrow:hover{background:#e3f2fd}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;max-width:350px;margin:0 auto}
.cal-weekday{text-align:center;font-size:12px;color:#999;padding:4px 0;font-weight:bold}
.cal-day{text-align:center;padding:4px 1px;border-radius:4px;cursor:pointer;font-size:12px;min-height:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent;transition:all .15s}
.cal-day:hover{background:#e3f2fd}.cal-day.workday{background:#f1f8e9}.cal-day.holiday{background:#fff3e0;color:#e65100}
.cal-day.weekend{background:#fce4ec;color:#c62828}.cal-day.selected{border-color:#1565C0;background:#bbdefb!important;font-weight:bold}
.cal-day.in-range{background:#e3f2fd!important}.cal-day.empty{background:transparent;cursor:default}
.cal-day.no-data{opacity:.4;cursor:default}.cal-day .note{font-size:9px;color:#f57c00;font-weight:bold}
.cal-legend{display:flex;gap:16px;margin-top:8px;font-size:12px;color:#666;justify-content:center}
.cal-legend span::before{content:'';display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:middle}
.cal-legend .w::before{background:#f1f8e9;border:1px solid #c5e1a5}.cal-legend .h::before{background:#fff3e0;border:1px solid #ffe0b2}
.cal-legend .e::before{background:#fce4ec;border:1px solid #f8bbd0}.cal-legend .s::before{background:#bbdefb;border:2px solid #1565C0}
.cal-actions{display:flex;gap:10px;align-items:center;margin-top:12px;justify-content:center}
.cal-actions .rd{font-size:14px;color:#1565C0;font-weight:bold;flex:1;text-align:center}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-p{background:#1565C0;color:white}.btn-p:hover{background:#0D47A1}
.btn-s{background:#e0e0e0;color:#333}.btn-s:hover{background:#bdbdbd}
.compare-section{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.dp{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
.stat-box{background:#f8f9fa;border-radius:8px;padding:14px;text-align:center}
.stat-box .n{font-size:24px;font-weight:bold;color:#1565C0}.stat-box .l{font-size:11px;color:#666;margin-top:4px}
.stat-box.up .n{color:#2e7d32}.stat-box.down .n{color:#c62828}
.tog{cursor:pointer;background:#e3f2fd;border:none;padding:10px 16px;border-radius:6px;font-size:13px;color:#1565C0;width:100%;text-align:left;font-family:inherit}
.tog:hover{background:#bbdefb}.tog::before{content:"▶ "}.tog.open::before{content:"▼ "}
.dc{display:none;margin-top:12px}.dc.show{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1565C0;color:white;padding:8px 6px;text-align:left;position:sticky;top:0}
td{padding:6px;border-bottom:1px solid #eee}tr:hover{background:#f5f5f5}
.pu{color:#2e7d32;font-weight:bold}.pd{color:#c62828;font-weight:bold}
.cc{width:100%;height:450px;margin:10px 0}
.ct{font-size:15px;font-weight:bold;padding:8px 0 4px;border-bottom:2px solid #1565C0;margin-bottom:8px}
.fb input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;width:280px;font-size:13px;margin-bottom:10px}
</style>
</head>
<body>


<div class="header">
  <h1>📊 Provider 汇入量报告</h1>
  <div class="sub">生成时间: 2026-04-23 08:01 | 数据范围: 2026-03-22 ~ 2026-04-22 | 321 个 Provider</div>
</div>


<div class="card">
  <h2>📅 日历 · 选择数据范围</h2>
  <div id="calBox"></div>
  <div class="cal-legend"><span class="w">工作日</span><span class="h">节假日</span><span class="e">周末</span><span class="s">已选范围</span></div>
  <div class="cal-actions">
    <div class="rd" id="rd">请选择日期范围</div>
    <button class="btn btn-s" onclick="resetR()">重置</button>
    <button class="btn btn-p" onclick="applyR()">确定</button>
  </div>
</div>

<div class="card">
  <h2>📈 工作日对比（已排除视频Provider：一点资讯-视频、虎牙视频）</h2>
  <div class="compare-section">
    <span>日期1:</span><select id="s1" class="dp" onchange="upComp()"></select>
    <span style="font-size:20px">→</span>
    <span>日期2:</span><select id="s2" class="dp" onchange="upComp()"></select>
  </div>
  <div id="cStats" class="stats"></div>
  <button class="tog" id="tComp" onclick="togD(this,'cDet')">全部 Provider 变化明细</button>
  <div id="cDet" class="dc">
    <div class="fb"><input placeholder="搜索名称或ID..." oninput="filt(this,'cTbl')"></div>
    <div style="max-height:600px;overflow-y:auto">
      <table id="cTbl"><thead><tr><th>#</th><th>Provider</th><th>ID</th><th id="hd1">日期1</th><th id="hd2">日期2</th><th>变化</th><th>变化%</th><th>范围总量</th></tr></thead><tbody id="cBody"></tbody></table>
    </div>
  </div>
</div>

<div class="card">
  <h2>📉 趋势图（按范围内汇入总量排序，每10个一组）</h2>
  <div id="charts"></div>
</div>

<script>
var DATA = JSON.parse(document.getElementById('jd').textContent);

var rS=null,rE=null,aS=DATA.dates[0],aE=DATA.dates[DATA.dates.length-1];
var vSet=new Set(DATA.videoProviders);
var cM={};DATA.calendar.forEach(function(c){cM[c.date]=c});
var dSet=new Set(DATA.dates);
var cY,cMo;(function(){var n=new Date();cY=n.getFullYear();cMo=n.getMonth()+1})();

function renCal(){
  var box=document.getElementById('calBox');
  var wd=['一','二','三','四','五','六','日'];
  var h='<div class="cal-header"><button class="cal-arrow" onclick="chMo(-1)">◀</button>';
  h+='<span class="cal-month-label">'+cY+'年'+cMo+'月</span>';
  h+='<button class="cal-arrow" onclick="chMo(1)">▶</button></div>';
  h+='<div class="cal-grid">';
  for(var i=0;i<7;i++)h+='<div class="cal-weekday">'+wd[i]+'</div>';
  var fd=new Date(cY,cMo-1,1);var fw=fd.getDay();fw=fw===0?6:fw-1;
  var dm=new Date(cY,cMo,0).getDate();
  for(var i=0;i<fw;i++)h+='<div class="cal-day empty"></div>';
  for(var d=1;d<=dm;d++){
    var ds=cY+'-'+String(cMo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var inf=cM[ds];var hd=dSet.has(ds);
    var cl='cal-day';
    if(inf){if(inf.isWorkday)cl+=' workday';else if(inf.note==='\u5047')cl+=' holiday';else cl+=' weekend'}
    else{var dow=new Date(cY,cMo-1,d).getDay();cl+=(dow===0||dow===6)?' weekend':' workday'}
    if(!hd)cl+=' no-data';
    if(rS&&rE&&ds>=rS&&ds<=rE)cl+=' in-range';
    if(ds===rS||ds===rE)cl+=' selected';
    var nt=inf&&inf.note?'<div class="note">'+inf.note+'</div>':'';
    var ck=hd?' onclick="ckDay(\''+ds+'\')"':'';
    h+='<div class="'+cl+'" data-date="'+ds+'"'+ck+'>'+d+nt+'</div>';
  }
  h+='</div>';box.innerHTML=h;upRD();
}
function chMo(d){cMo+=d;if(cMo>12){cMo=1;cY++}if(cMo<1){cMo=12;cY--}renCal()}
function ckDay(d){if(!rS||(rS&&rE)){rS=d;rE=null}else{if(d<rS){rE=rS;rS=d}else rE=d}renCal()}
function resetR(){rS=null;rE=null;renCal()}
function applyR(){if(!rS||!rE){alert('请先选择开始和结束日期');return}aS=rS;aE=rE;popSel();upComp();renCharts()}
function upRD(){var e=document.getElementById('rd');if(rS&&rE)e.textContent='已选: '+rS+' ~ '+rE;else if(rS)e.textContent='起始: '+rS+'，请选择结束日期';else e.textContent='当前范围: '+aS+' ~ '+aE}

function getAD(){return DATA.dates.filter(function(d){return d>=aS&&d<=aE})}
function getAW(){return getAD().filter(function(d){return cM[d]&&cM[d].isWorkday})}

function popSel(){
  var dates=getAD();var wds=getAW();
  ['s1','s2'].forEach(function(id){
    var sel=document.getElementById(id);sel.innerHTML='';
    dates.forEach(function(d){var c=cM[d];var opt=document.createElement('option');opt.value=d;
      opt.textContent=d+' 周'+(c?c.wdName:'?')+(c&&!c.isWorkday?' (休)':'');sel.appendChild(opt)});
  });
  if(wds.length>=2){document.getElementById('s1').value=wds[wds.length-2];document.getElementById('s2').value=wds[wds.length-1]}
  else if(dates.length>=2){document.getElementById('s1').value=dates[dates.length-2];document.getElementById('s2').value=dates[dates.length-1]}
}

function upComp(){
  var d1=document.getElementById('s1').value,d2=document.getElementById('s2').value;
  if(!d1||!d2)return;
  var c1=cM[d1],c2=cM[d2];
  var l1=d1+' 周'+(c1?c1.wdName:''),l2=d2+' 周'+(c2?c2.wdName:'');
  document.getElementById('hd1').textContent=l1;document.getElementById('hd2').textContent=l2;
  var ad=getAD();var ps=DATA.providers.filter(function(p){return !vSet.has(p)});
  var rows=[],t1=0,t2=0;
  ps.forEach(function(pid){var pd=DATA.providerData[pid]||{};var v1=pd[d1]||0,v2=pd[d2]||0;
    var ch=v2-v1;var pct=v1>0?Math.round((ch/v1*100)*10)/10:(v2>0?100:0);
    var rt=0;ad.forEach(function(d){rt+=(pd[d]||0)});
    rows.push({pid:pid,name:DATA.providerNames[pid]||pid,v1:v1,v2:v2,ch:ch,pct:pct,rt:rt});t1+=v1;t2+=v2});
  rows.sort(function(a,b){return Math.abs(b.ch)-Math.abs(a.ch)});
  var tc=t2-t1;var tp=t1>0?Math.round((tc/t1*100)*10)/10:0;
  var up=rows.filter(function(r){return r.ch>0}).length;
  var dn=rows.filter(function(r){return r.ch<0}).length;
  document.getElementById('cStats').innerHTML=
    '<div class="stat-box"><div class="n">'+t1.toLocaleString()+'</div><div class="l">'+l1+'</div></div>'+
    '<div class="stat-box"><div class="n">'+t2.toLocaleString()+'</div><div class="l">'+l2+'</div></div>'+
    '<div class="stat-box '+(tc>0?'up':'down')+'"><div class="n">'+(tc>0?'+':'')+tc.toLocaleString()+'</div><div class="l">变化 ('+tp+'%)</div></div>'+
    '<div class="stat-box up"><div class="n">'+up+'</div><div class="l">升高</div></div>'+
    '<div class="stat-box down"><div class="n">'+dn+'</div><div class="l">降低</div></div>';
  var tb=document.getElementById('cBody');
  tb.innerHTML=rows.map(function(r,i){
    var pc=r.pct>0?'pu':(r.pct<0?'pd':'');
    return '<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td style="font-size:11px;color:#888">'+r.pid+'</td><td>'+r.v1.toLocaleString()+'</td><td>'+r.v2.toLocaleString()+'</td><td>'+(r.ch>0?'+':'')+r.ch.toLocaleString()+'</td><td class="'+pc+'">'+(r.pct>0?'+':'')+r.pct+'%</td><td>'+r.rt.toLocaleString()+'</td></tr>'
  }).join('');
  document.getElementById('tComp').textContent='全部 Provider 变化明细（'+rows.length+' 个）';
}

var cInst=[];
function renCharts(){
  var ad=getAD();var ps=DATA.providers.filter(function(p){return !vSet.has(p)});
  var ranked=ps.map(function(pid){var pd=DATA.providerData[pid]||{};var t=0;ad.forEach(function(d){t+=(pd[d]||0)});return{pid:pid,t:t}}).sort(function(a,b){return b.t-a.t});
  cInst.forEach(function(c){c.dispose()});cInst=[];
  var area=document.getElementById('charts');var h='';
  var colors=['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4','#469990'];
  for(var i=0;i<ranked.length;i+=10){
    var s=i+1,e=Math.min(i+10,ranked.length);
    h+='<div class="ct">排名 #'+s+'-'+e+'</div><div id="ch'+Math.floor(i/10)+'" class="cc"></div>';
  }
  area.innerHTML=h;
  for(var i=0;i<ranked.length;i+=10){
    var gi=Math.floor(i/10);var page=ranked.slice(i,i+10);
    var series=page.map(function(item,j){return{
      name:(DATA.providerNames[item.pid]||item.pid)+'\n'+item.pid,
      type:'line',data:ad.map(function(d){return(DATA.providerData[item.pid]||{})[d]||0}),
      itemStyle:{color:colors[j%10]},lineStyle:{width:2},symbol:'circle',symbolSize:4
    }});
    var el=document.getElementById('ch'+gi);if(!el)continue;
    var chart=echarts.init(el);
    chart.setOption({tooltip:{trigger:'axis'},
      legend:{type:'plain',orient:'vertical',right:0,top:10,textStyle:{fontSize:10,lineHeight:16},itemWidth:14,itemHeight:8,itemGap:8},
      grid:{left:60,right:150,top:30,bottom:50},
      xAxis:{type:'category',data:ad.map(function(d){return d.substring(5)}),axisLabel:{rotate:45,fontSize:11}},
      yAxis:{type:'value'},series:series});
    cInst.push(chart);
  }
  window.addEventListener('resize',function(){cInst.forEach(function(c){c.resize()})});
}

function togD(btn,id){var el=document.getElementById(id);btn.classList.toggle('open');el.classList.toggle('show')}
function filt(inp,tid){var v=inp.value.toLowerCase();document.getElementById(tid).querySelectorAll('tbody tr').forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(v)>=0?'':'none'})}

rS=DATA.dates[0];rE=DATA.dates[DATA.dates.length-1];
renCal();popSel();upComp();renCharts();
</script>
