<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f7fa;color:#333;padding:20px;max-width:1500px;margin:0 auto}
.header{background:linear-gradient(135deg,#1565C0,#0D47A1);color:white;padding:24px 30px;border-radius:12px;margin-bottom:20px}
.header h1{font-size:22px}.header .sub{opacity:.8;font-size:13px;margin-top:6px}
.tabs{display:flex;gap:0;margin-bottom:20px}
.tab-btn{padding:12px 32px;font-size:15px;border:none;cursor:pointer;background:#e0e0e0;color:#555;font-family:inherit;font-weight:bold;transition:all .2s}
.tab-btn:first-child{border-radius:8px 0 0 8px}.tab-btn:last-child{border-radius:0 8px 8px 0}
.tab-btn.active{background:#1565C0;color:white}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:17px;margin-bottom:14px}
.cal-header{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:12px}
.cal-month-label{font-size:15px;font-weight:bold;min-width:120px;text-align:center}
.cal-arrow{background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;font-size:14px;cursor:pointer;color:#1565C0}
.cal-arrow:hover{background:#e3f2fd}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;max-width:350px;margin:0 auto}
.cal-weekday{text-align:center;font-size:12px;color:#999;padding:4px 0;font-weight:bold}
.cal-day{text-align:center;padding:4px 1px;border-radius:4px;cursor:pointer;font-size:12px;min-height:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent;transition:all .15s}
.cal-day:hover{background:#e3f2fd}.cal-day.workday{background:#f1f8e9}.cal-day.holiday{background:#fff3e0;color:#e65100}
.cal-day.weekend{background:#fce4ec;color:#c62828}.cal-day.selected{border-color:#1565C0;background:#bbdefb!important;font-weight:bold}
.cal-day.in-range{background:#e3f2fd!important}.cal-day.empty{background:transparent;cursor:default}
.cal-day.no-data{opacity:.4;cursor:default}.cal-day .note{font-size:9px;color:#f57c00;font-weight:bold}
.cal-legend{display:flex;gap:16px;margin-top:8px;font-size:12px;color:#666;justify-content:center}
.cal-legend span::before{content:'';display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:middle}
.cal-legend .w::before{background:#f1f8e9;border:1px solid #c5e1a5}.cal-legend .h::before{background:#fff3e0;border:1px solid #ffe0b2}
.cal-legend .e::before{background:#fce4ec;border:1px solid #f8bbd0}.cal-legend .s::before{background:#bbdefb;border:2px solid #1565C0}
.cal-actions{display:flex;gap:10px;align-items:center;margin-top:12px;justify-content:center}
.cal-actions .rd{font-size:14px;color:#1565C0;font-weight:bold;flex:1;text-align:center}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-p{background:#1565C0;color:white}.btn-p:hover{background:#0D47A1}
.btn-s{background:#e0e0e0;color:#333}.btn-s:hover{background:#bdbdbd}
.compare-section{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.dp{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
.stat-box{background:#f8f9fa;border-radius:8px;padding:14px;text-align:center}
.stat-box .n{font-size:24px;font-weight:bold;color:#1565C0}.stat-box .l{font-size:11px;color:#666;margin-top:4px}
.stat-box.up .n{color:#2e7d32}.stat-box.down .n{color:#c62828}
.tog{cursor:pointer;background:#e3f2fd;border:none;padding:10px 16px;border-radius:6px;font-size:13px;color:#1565C0;width:100%;text-align:left;font-family:inherit}
.tog:hover{background:#bbdefb}.tog::before{content:"\25b6 "}.tog.open::before{content:"\25bc "}
.dc{display:none;margin-top:12px}.dc.show{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1565C0;color:white;padding:8px 6px;text-align:left;position:sticky;top:0}
td{padding:6px;border-bottom:1px solid #eee}tr:hover{background:#f5f5f5}
.pu{color:#2e7d32;font-weight:bold}.pd{color:#c62828;font-weight:bold}
.cc{width:100%;height:450px;margin:10px 0}
.ct{font-size:15px;font-weight:bold;padding:8px 0 4px;border-bottom:2px solid #1565C0;margin-bottom:8px}
.fb input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;width:280px;font-size:13px;margin-bottom:10px}
.alert-cell{background:#ffebee!important;color:#c62828;font-weight:bold}
.audit-overview td,.audit-overview th{text-align:center;padding:8px}
.audit-overview th{min-width:80px}
.chart-box{width:100%;height:350px;margin:10px 0}
.eff-table td,.eff-table th{text-align:center;font-size:12px;padding:6px 8px}
</style>
</head>

  var videoNameMap={'video-copyright':'\u4fb5\u6743','video-other-political-obscene-bloodyViolence':'\u5176\u4ed6\u5408\u89c4\u95ee\u9898','textNotMatchImage-titleTypo-unintelligible':'\u9898\u6587\u56fe\u6587\u4e0d\u7b26','foreignVideos-noChineseSubtitles':'\u65e0\u4e2d\u6587\u5b57\u5e55\u5916\u8bed\u89c6\u9891','AI-generation':'AI\u751f\u6210','blurring':'\u6a21\u7cca','bad-language':'\u810f\u8bdd','video-outdated':'\u8fc7\u65f6','duration-less-than-20-seconds':'\u65f6\u957f<20\u79d2','incomplete':'\u4e0d\u5b8c\u6574','video-advertisement':'\u5e7f\u544a','noise-distortion-noSound':'\u6742\u97f3\u7834\u97f3\u65e0\u58f0','vertical-screen-tensile-deformation':'\u7ad6\u5c4f\u62c9\u4f38\u53d8\u5f62'};
  // Helper: build date option HTML from D2.auditDates
  var _adOpts='';
  if(D2.auditDates){D2.auditDates.forEach(function(d){_adOpts+='<option value="'+d+'">'+d+'</option>'});}

  // Helper: aggregate reject reasons over a date range
  function _aggregateReject(startD,endD,field){
    var map={};
    if(!D2.auditDates)return[];
    D2.auditDates.forEach(function(d){
      if(d>=startD&&d<=endD){
        var reasons=(D2.audit[d]&&D2.audit[d][field])||[];
        reasons.forEach(function(r){map[r.token]=(map[r.token]||0)+(r.cnt||0)});
      }
    });
    var arr=[];for(var k in map)arr.push({token:k,cnt:map[k]});
    return arr;
  }

  // Comparison handler for both blocks
  function _doCompare(prefix,field){
    var nameMap=window._nameMaps[prefix]||{};
    var s1=document.getElementById(prefix+'P1S').value;
    var e1=document.getElementById(prefix+'P1E').value;
    var s2=document.getElementById(prefix+'P2S').value;
    var e2=document.getElementById(prefix+'P2E').value;
    if(!s1||!e1||!s2||!e2)return;
    var d1=_aggregateReject(s1,e1,field);
    var d2=_aggregateReject(s2,e2,field);
    var m1={};d1.forEach(function(r){m1[r.token]=r.cnt});
    var m2={};d2.forEach(function(r){m2[r.token]=r.cnt});
    var allTokens={};d1.forEach(function(r){allTokens[r.token]=1});d2.forEach(function(r){allTokens[r.token]=1});
    var rows=[];
    for(var t in allTokens){
      var v1=m1[t]||0,v2=m2[t]||0;
      var chg=v2-v1;
      var pct=v1>0?((chg/v1)*100).toFixed(1):(v2>0?'N/A':'0.0');
      rows.push({token:t,name:nameMap[t]||t,v1:v1,v2:v2,chg:chg,pct:pct});
    }
    rows.sort(function(a,b){return b.v2-a.v2});
    var h='<table class="eff-table" style="margin-top:8px"><thead><tr><th>\u62d2\u7edd\u539f\u56e0</th><th>\u65f6\u95f4\u6bb51\u6570\u91cf</th><th>\u65f6\u95f4\u6bb52\u6570\u91cf</th><th>\u53d8\u5316\u91cf</th><th>\u53d8\u5316%</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var cc=r.chg>0?' style="color:#e53935"':r.chg<0?' style="color:#43a047"':'';
      h+='<tr><td>'+r.name+'</td><td>'+r.v1+'</td><td>'+r.v2+'</td><td'+cc+'>'+((r.chg>0?'+':'')+r.chg)+'</td><td'+cc+'>'+(r.pct==='N/A'?'N/A':r.pct+'%')+'</td></tr>';
    });
    h+='</tbody></table>';
    document.getElementById(prefix+'CmpResult').innerHTML=h;
  }

    s+='<div id="'+prefix+'CmpPanel" style="display:none;background:#fafafa;border:1px solid #e0e0e0;border-radius:6px;padding:10px;margin-bottom:8px">';
    s+='<div style="margin-bottom:6px"><span>\u65f6\u95f4\u6bb51: </span><select id="'+prefix+'P1S">'+_adOpts+'</select><span> ~ </span><select id="'+prefix+'P1E">'+_adOpts+'</select></div>';
    s+='<div style="margin-bottom:6px"><span>\u65f6\u95f4\u6bb52: </span><select id="'+prefix+'P2S">'+_adOpts+'</select><span> ~ </span><select id="'+prefix+'P2E">'+_adOpts+'</select></div>';
    s+='<button onclick="_doCompare(\''+prefix+'\',\''+field+'\')" style="cursor:pointer;background:#1976d2;color:#fff;border:none;border-radius:4px;padding:4px 16px;font-size:13px">\u786e\u5b9a</button>';
    s+='<div id="'+prefix+'CmpResult"></div></div>';
    return s;
  }
  // Expose helpers to global for onclick
  window._aggregateReject=_aggregateReject;

  rejectDiv+='<h3>\u89c6\u9891HI\u62d2\u7edd\u539f\u56e0</h3>';
  window._nameMaps['vid']=videoNameMap;
  rejectDiv+=_cmpUI('vid','hi_reject_reason_video');

    rejectDiv+='<div id="rejectChartVideo" class="chart-box"></div>';
  } else {
    rejectDiv+='<p style="color:#999;padding:10px">\u5f53\u65e5\u65e0\u62d2\u7edd\u8bb0\u5f55</p>';
  }

  // ── Delay distribution ──
  var dd = ad.avg_duration_all||{};
  var delayDiv='';
  var delayStat='<div class="stats"><div class="stat-box"><div class="n">'+avgH+'</div><div class="l">\u5168\u90e8\u5e73\u5747\u53d1\u5e03\u65f6\u957f</div></div><div class="stat-box"><div class="n">'+avgHArt+'</div><div class="l">\u56fe\u6587\u5e73\u5747\u53d1\u5e03\u65f6\u957f</div></div><div class="stat-box"><div class="n">'+avgHVid+'</div><div class="l">\u89c6\u9891\u5e73\u5747\u53d1\u5e03\u65f6\u957f</div></div></div>';

  // ── Editor efficiency table ──
  var editors = (ad.review_by_editor||[]).filter(function(e){return !D2.validReviewers||D2.validReviewers.indexOf(e.Requester)>=0});
  var wm = {};
  (ad.working_minutes||[]).filter(function(w){return !D2.validReviewers||D2.validReviewers.indexOf(w.Requester)>=0}).forEach(function(w){wm[w.Requester]=w});
  var effRows=[];
  editors.forEach(function(e){
    var w=wm[e.Requester]||{};
    var mins=w.sumMinutes||0;
    var eff=mins>0?(e.reviewCnt/mins).toFixed(2):'-';
    var nm=D2.reviewerNames[e.Requester]||e.Requester.split('@')[0];
    var ded='-';
    if(D2.deductions){var dedTotal=0,dedSlash=false,dedFound=false;rangeDates.forEach(function(rd){var dd=D2.deductions[rd];if(dd&&dd[nm]!==undefined){dedFound=true;if(dd[nm]==='/')dedSlash=true;else dedTotal+=parseFloat(dd[nm])||0}});if(dedFound){ded=dedSlash&&dedTotal===0?'/':String(dedTotal)}}
    effRows.push({name:nm,email:e.Requester,ded:ded,total:e.reviewCnt,approve:e.approveCnt,reject:e.rejectCnt,rate:e.rejectRate,mins:mins,eff:eff});
  });
  // Add reviewers who are in deductions but not in editors (e.g. absent '/')
  if(D2.deductions){var existNames=effRows.map(function(r){return r.name});rangeDates.forEach(function(rd){var dd=D2.deductions[rd];if(dd){Object.keys(dd).forEach(function(nm){if(existNames.indexOf(nm)<0){var ded='/';existNames.push(nm);effRows.push({name:nm,email:'',ded:ded,total:0,approve:0,reject:0,rate:'0',mins:0,eff:'-'})}})}});}
  effRows.sort(function(a,b){return b.total-a.total});
  var effH='<table class="eff-table"><thead><tr><th>#</th><th>\u5ba1\u6838\u5458</th><th>\u603b\u8ba1</th><th>\u901a\u8fc7</th><th>\u62d2\u7edd</th><th>\u62d2\u7edd\u7387%</th><th>\u5de5\u4f5c\u65f6\u957f(min)</th><th>\u4eba\u6548(\u6761/min)</th><th>\u590d\u5ba1\u6263\u5206</th></tr></thead><tbody>';
  effRows.forEach(function(r,i){
    var effCl=(r.eff!=='-'&&parseFloat(r.eff)<2.6)?'alert-cell':'';
    effH+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.total.toLocaleString()+'</td><td>'+r.approve.toLocaleString()+'</td><td>'+r.reject.toLocaleString()+'</td><td>'+r.rate+'%</td><td>'+r.mins+'</td><td class="'+effCl+'">'+r.eff+'</td><td>'+r.ded+'</td></tr>';
  });
  effH+='</tbody></table>';

  // ── Send vs Review ──
  var svr=ad.hourly_send_review||[];

  // Assemble
  var html='';

  document.getElementById('auditContent').innerHTML=html;

  // Render charts
  // Reject reasons charts
  if(articleReasons.length>0){
    var top10a=articleReasons.slice(0,10);
    var rca=echarts.init(document.getElementById('rejectChartArticle'));

      series:[{type:'bar',data:top10a.map(function(r){return r.cnt||0}).reverse(),itemStyle:{color:'#ef5350'}}]
    });

  if(videoReasons.length>0){

    rcv.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
      grid:{left:200,right:40,top:20,bottom:30},
      xAxis:{type:'value'},
      yAxis:{type:'category',data:top10v.map(function(r){return videoNameMap[r.token]||r.token||'Unknown'}).reverse(),axisLabel:{fontSize:11,width:180,overflow:'truncate'}},

  // No delay distribution chart (only avg duration available)

      tooltip:{trigger:'axis'},
      legend:{data:['\u9001\u5ba1\u91cf','\u5ba1\u6838\u91cf']},

        {name:'\u9001\u5ba1\u91cf',type:'bar',data:svr.map(function(s){return s.SendReviewCnt||0}),itemStyle:{color:'#42a5f5'}},
        {name:'\u5ba1\u6838\u91cf',type:'bar',data:svr.map(function(s){return s.ReviewCnt||0}),itemStyle:{color:'#66bb6a'}}
      ]
    });
    auditCharts.push(sc);
  }

  window.addEventListener('resize',function(){auditCharts.forEach(function(c){c.resize()})});

function switchTab(n){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-btn')[n].classList.add('active');
  document.querySelectorAll('.tab-content')[n].classList.add('active');
  if(n===0){renCal1();setTimeout(function(){cInst1.forEach(function(c){c.resize()})},100)}
  if(n===1){renCal2();setTimeout(function(){auditCharts.forEach(function(c){c.resize()})},100)}
}
